<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kasir Refleksi - MOKA Style</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Kasir Refleksi</h1>
  <main>
    <section>
      <h2>Produk</h2>
      <ul class="kategori" id="kategoriList"></ul>
      <div id="produkList"></div>
      <form id="formTambahProduk">
        <label>Nama Produk</label>
        <input type="text" id="produkNama" required>
        <label>Harga</label>
        <input type="number" id="produkHarga" required>
        <label>Kategori</label>
        <select id="produkKategori">
          <option>Refleksi</option>
          <option>Full Body Massage</option>
          <option>Other Service</option>
        </select>
        <button type="submit">Tambah Produk</button>
      </form>
    </section>

    <section>
      <h2>Keranjang</h2>
      <div id="cartItems"></div>
      <label for="terapisSelect">Terapis</label>
      <select id="terapisSelect"></select>
      <button onclick="selesaiTransaksi()">Selesai & Cetak Struk</button>
      <button onclick="hapusSemuaTransaksi()">Hapus Riwayat</button>
    </section>

    <section>
      <h2>Kelola Terapis</h2>
      <div id="daftarTerapis"></div>
      <form id="formEditTerapis">
        <label>Nama Terapis</label>
        <input type="text" id="terapisNama" required>
        <label>Komisi (%)</label>
        <input type="number" id="terapisKomisi" required>
        <button type="submit">Simpan</button>
      </form>
    </section>

    <section>
      <h2>Riwayat Transaksi</h2>
      <div id="riwayatBox">
        <div id="riwayatList"></div>
        <button onclick="exportExcel()">Export Excel</button>
      </div>
    </section>
  </main>

  <div id="popupStruk" style="display:none">
    <h3>Struk</h3>
    <ul id="strukList"></ul>
    <p id="totalBayarStruk"></p>
    <button onclick="tutupStruk()">Tutup</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
